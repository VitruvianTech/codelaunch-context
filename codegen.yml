# https://www.graphql-code-generator.com/docs/config-reference/codegen-config

schema: ${GQL_URL:http://localhost:3000/gql}
generates:
  context/assets/graphql/schema/default.json:
    documents: ./**/graphql/default/**/*.gql
    plugins:
      - urql-introspection
  context/assets/graphql/index.ts:
    documents: ./**/graphql/default/**/*.gql
    config:
      gqlImport: '@urql/vue#gql'
    plugins:
      - typescript
      - typescript-operations
      - typescript-vue-urql
      - typescript-urql-graphcache
      - typescript-document-nodes
